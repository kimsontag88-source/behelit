<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>DEADZONE II — DEMO</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0a;color:#e0e0e0;font-family:'Courier New',monospace;overflow:hidden;width:100vw;height:100vh}
canvas{display:block;image-rendering:pixelated}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
#hud{position:absolute;top:10px;left:10px;font-size:11px;letter-spacing:.1em;line-height:1.8}
#hud .bar{display:inline-block;width:60px;height:6px;background:#1a1a1a;border-radius:3px;vertical-align:middle;margin-left:4px;overflow:hidden}
#hud .bar-fill{height:100%;border-radius:3px;transition:width .3s}
#msg{position:absolute;bottom:60px;left:50%;transform:translateX(-50%);font-size:12px;color:#ffb347;letter-spacing:.1em;opacity:0;transition:opacity .3s;text-align:center;white-space:nowrap}
#msg.show{opacity:1}
#day-indicator{position:absolute;top:10px;right:10px;font-size:12px;text-align:right;line-height:1.8}
#controls{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:10px;color:rgba(255,255,255,.25);letter-spacing:.1em;text-align:center}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.85);pointer-events:auto;transition:opacity .4s;z-index:10}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(24px,5vw,40px);font-weight:900;color:#ff7a50;letter-spacing:-.02em}
#overlay .sub{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:.2em;margin:4px 0 20px}
#overlay .stats{font-size:12px;color:#ffb347;margin-bottom:16px;display:none}
#overlay button{background:none;border:1px solid rgba(255,122,80,.4);color:#ff7a50;padding:12px 32px;border-radius:8px;font-family:inherit;font-size:13px;letter-spacing:.12em;cursor:pointer;transition:all .2s}
#overlay button:hover{background:rgba(255,122,80,.1);border-color:#ff7a50}
.demo-tag{font-size:10px;color:rgba(255,255,255,.2);letter-spacing:.15em;margin-top:14px}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div>HP <span class="bar"><span class="bar-fill" id="hpBar" style="width:100%;background:#3dffb0"></span></span> <span id="hpVal">100</span></div>
    <div>STAM <span class="bar"><span class="bar-fill" id="stamBar" style="width:100%;background:#4fc3f7"></span></span></div>
    <div>FOOD <span class="bar"><span class="bar-fill" id="foodBar" style="width:100%;background:#ffb347"></span></span></div>
    <div style="margin-top:4px;font-size:10px;color:rgba(255,255,255,.3)">KILLS <span id="killVal">0</span></div>
  </div>
  <div id="day-indicator">
    <div>DAY <span id="dayVal">1</span></div>
    <div id="timeLabel" style="color:#ffb347">DAWN</div>
  </div>
  <div id="msg"></div>
  <div id="controls">WASD 이동 · SHIFT 달리기 · H 은신 · SPACE 공격 · 마우스 조준</div>
</div>
<div id="overlay">
  <h1>DEADZONE II</h1>
  <div class="sub">A SURVIVAL DEMO BY BEHELIT</div>
  <div class="stats" id="endStats"></div>
  <button id="startBtn">SURVIVE</button>
  <div class="demo-tag">DEMO — 정식 모바일 앱 개발 예정</div>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('c'), ctx = canvas.getContext('2d');

// ── constants ──
const T = 16, SC = 2, TS = T * SC;
const COLS = 40, ROWS = 28;
let VW, VH, W, H;

function resize() {
  W = window.innerWidth; H = window.innerHeight;
  VW = Math.floor(W / TS); VH = Math.floor(H / TS);
  canvas.width = W; canvas.height = H;
}
resize(); window.addEventListener('resize', resize);

// tile types
const FLOOR=0, WALL=1, TREE=2, ROAD=3, BUSH=4, CRATE=5, WATER=7;
const TILE_COL = {
  [FLOOR]:'#2a2416',[WALL]:'#4a3a20',[TREE]:'#2a5a10',
  [ROAD]:'#3a4040',[BUSH]:'#3a6a20',[CRATE]:'#8a7a40',[WATER]:'#2a5a8a'
};

// ── map gen (BSP) ──
let map, rooms, items;

function genMap() {
  map = Array.from({length:ROWS}, () => Array(COLS).fill(WALL));
  rooms = [];

  function split(x, y, w, h, depth) {
    if (depth > 4 || w < 10 || h < 10) {
      // create room with padding
      const pad = 1;
      const rx = x + pad, ry = y + pad;
      const rw = Math.max(4, w - pad * 2), rh = Math.max(4, h - pad * 2);
      if (rx + rw <= COLS && ry + rh <= ROWS) {
        rooms.push({ x: rx, y: ry, w: rw, h: rh });
        for (let dy = 0; dy < rh; dy++)
          for (let dx = 0; dx < rw; dx++)
            if (ry + dy < ROWS && rx + dx < COLS) map[ry + dy][rx + dx] = FLOOR;
      }
      return;
    }
    if (w >= h) {
      const minSplit = Math.min(5, Math.floor(w * 0.3));
      const maxSplit = Math.max(minSplit + 1, Math.floor(w * 0.7));
      const sx = x + minSplit + Math.floor(Math.random() * (maxSplit - minSplit));
      split(x, y, sx - x, h, depth + 1);
      split(sx, y, x + w - sx, h, depth + 1);
      // horizontal corridor
      const cy = y + Math.floor(h / 2);
      if (cy >= 0 && cy < ROWS)
        for (let cx = x; cx < x + w && cx < COLS; cx++) map[cy][cx] = FLOOR;
    } else {
      const minSplit = Math.min(5, Math.floor(h * 0.3));
      const maxSplit = Math.max(minSplit + 1, Math.floor(h * 0.7));
      const sy = y + minSplit + Math.floor(Math.random() * (maxSplit - minSplit));
      split(x, y, w, sy - y, depth + 1);
      split(x, sy, w, y + h - sy, depth + 1);
      // vertical corridor
      const cx = x + Math.floor(w / 2);
      if (cx >= 0 && cx < COLS)
        for (let cy = y; cy < y + h && cy < ROWS; cy++) map[cy][cx] = FLOOR;
    }
  }
  split(1, 1, COLS - 2, ROWS - 2, 0);

  // roads
  for (let x = 0; x < COLS; x++) { map[10][x] = ROAD; map[20][x] = ROAD; }
  for (let y = 0; y < ROWS; y++) { map[y][13] = ROAD; map[y][27] = ROAD; }

  // trees & bushes on floor tiles
  for (let i = 0; i < 50; i++) {
    const x = 1 + Math.floor(Math.random() * (COLS - 2));
    const y = 1 + Math.floor(Math.random() * (ROWS - 2));
    if (map[y][x] === FLOOR) map[y][x] = Math.random() < 0.4 ? BUSH : TREE;
  }

  // crates in rooms
  items = [];
  rooms.forEach(r => {
    const n = 1 + Math.floor(Math.random() * 2);
    for (let i = 0; i < n; i++) {
      const cx = r.x + Math.floor(Math.random() * r.w);
      const cy = r.y + Math.floor(Math.random() * r.h);
      if (cy < ROWS && cx < COLS && map[cy][cx] === FLOOR) {
        map[cy][cx] = CRATE;
        const roll = Math.random();
        items.push({ x: cx, y: cy, type: roll < 0.4 ? 'food' : roll < 0.65 ? 'med' : 'weapon', picked: false });
      }
    }
  });
}

// ── state ──
let player, zombies, particles, fog, explored;
let keys={}, mouseX=0, mouseY=0;
let gameRunning=false, tick=0, dayTick=0, day=1, isNight=false;
let msgTimer=0, kills=0;
const DAY_LEN=2400, NIGHT_LEN=1600;

function showMsg(txt) { $('msg').textContent=txt; $('msg').classList.add('show'); msgTimer=180; }

function init() {
  genMap();
  // fallback if BSP fails
  if (rooms.length === 0) {
    rooms.push({ x: 5, y: 5, w: 10, h: 8 });
    for (let dy = 0; dy < 8; dy++) for (let dx = 0; dx < 10; dx++) map[5 + dy][5 + dx] = FLOOR;
  }
  const r = rooms[Math.floor(Math.random() * rooms.length)];
  player = {
    x: (r.x + Math.floor(r.w / 2)) * TS + TS / 2,
    y: (r.y + Math.floor(r.h / 2)) * TS + TS / 2,
    hp: 100, maxHp: 100, stamina: 100, food: 80,
    speed: 3, stealth: false, attacking: false, atkTimer: 0, atkAngle: 0,
    flashTimer: 0
  };
  // ensure player tile is walkable
  const ptx = Math.floor(player.x / TS), pty = Math.floor(player.y / TS);
  if (ptx >= 0 && ptx < COLS && pty >= 0 && pty < ROWS) map[pty][ptx] = FLOOR;

  zombies = []; particles = [];
  fog = Array.from({ length: ROWS }, () => Array(COLS).fill(true));
  explored = Array.from({ length: ROWS }, () => Array(COLS).fill(false));
  tick = 0; dayTick = 0; day = 1; isNight = false; kills = 0;
  updateFog(); // reveal initial area
  spawnWave(5);
  updateHUD();
}

function spawnWave(count) {
  for (let i=0;i<count;i++) {
    let sx,sy,tries=0;
    do {
      sx = Math.floor(Math.random()*COLS);
      sy = Math.floor(Math.random()*ROWS);
      tries++;
    } while (tries<100 && (map[sy][sx]===WALL || map[sy][sx]===WATER || Math.hypot(sx*TS-player.x,sy*TS-player.y)<TS*8));
    const isFast = day>=2 && Math.random()<0.25;
    const isBoss = day>=4 && Math.random()<0.08;
    zombies.push({
      x:sx*TS+TS/2, y:sy*TS+TS/2,
      hp: isBoss?12 : 2+Math.floor(day/2),
      maxHp: isBoss?12 : 2+Math.floor(day/2),
      speed: isBoss?0.6 : isFast?1.4:0.8,
      alerted:false, alertTimer:0,
      wanderAngle:Math.random()*Math.PI*2, wanderTimer:0,
      type: isBoss?'boss':isFast?'fast':'normal',
      flashTimer:0, stunTimer:0
    });
  }
}

// ── input ──
window.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true;if(e.key===' ')e.preventDefault()});
window.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});
canvas.addEventListener('mousemove',e=>{mouseX=e.clientX;mouseY=e.clientY});

// ── fog ──
function updateFog() {
  const px=Math.floor(player.x/TS), py=Math.floor(player.y/TS);
  const range = isNight ? 5 : 7;
  for(let y=0;y<ROWS;y++) for(let x=0;x<COLS;x++) fog[y][x]=true;
  for(let dy=-range;dy<=range;dy++) for(let dx=-range;dx<=range;dx++) {
    const tx=px+dx, ty=py+dy;
    if(tx<0||tx>=COLS||ty<0||ty>=ROWS) continue;
    if(dx*dx+dy*dy > range*range) continue;
    // raycast
    let blocked=false;
    const steps=Math.max(Math.abs(dx),Math.abs(dy))*2;
    for(let s=1;s<=steps;s++) {
      const cx=Math.round(px+dx*s/steps), cy=Math.round(py+dy*s/steps);
      if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS&&map[cy][cx]===WALL){blocked=true;break;}
    }
    if(!blocked){fog[ty][tx]=false;explored[ty][tx]=true;}
  }
}

// ── collision ──
function canMove(x,y,r) {
  const tiles = [[x-r,y-r],[x+r,y-r],[x-r,y+r],[x+r,y+r]];
  for(const[px,py] of tiles) {
    const tx=Math.floor(px/TS),ty=Math.floor(py/TS);
    if(tx<0||tx>=COLS||ty<0||ty>=ROWS) return false;
    const t=map[ty][tx];
    if(t===WALL||t===TREE||t===WATER) return false;
  }
  return true;
}

function lineOfSight(x1,y1,x2,y2) {
  const dx=x2-x1,dy=y2-y1,dist=Math.hypot(dx,dy);
  const steps=Math.ceil(dist/TS);
  for(let i=1;i<steps;i++) {
    const cx=Math.floor((x1+dx*i/steps)/TS), cy=Math.floor((y1+dy*i/steps)/TS);
    if(cx>=0&&cx<COLS&&cy>=0&&cy<ROWS&&map[cy][cx]===WALL) return false;
  }
  return true;
}

// ── particles ──
function burst(x,y,color,n=8) {
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,sp=Math.random()*3+1;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,r:Math.random()*2+1,color,life:1,decay:.03+Math.random()*.02});
  }
}

// ── update ──
function update() {
  if(!gameRunning) return;
  tick++;

  // day/night
  dayTick++;
  const cycleLen = DAY_LEN + NIGHT_LEN;
  const inCycle = dayTick % cycleLen;
  const wasNight = isNight;
  isNight = inCycle >= DAY_LEN;
  if(wasNight && !isNight) { day++; spawnWave(3+day*2); showMsg(`DAY ${day} — 새로운 날이 밝았다`); }
  if(!wasNight && isNight) showMsg('밤이 되었다... 조심해라');

  const timeRatio = isNight ? (inCycle-DAY_LEN)/NIGHT_LEN : inCycle/DAY_LEN;
  $('dayVal').textContent = day;
  $('timeLabel').textContent = isNight ? '🌙 NIGHT' : (timeRatio<0.3?'🌅 DAWN':timeRatio<0.7?'☀ DAY':'🌆 DUSK');
  $('timeLabel').style.color = isNight ? '#4fc3f7' : '#ffb347';

  // player stealth
  if(keys['h']) player.stealth = !player.stealth, keys['h']=false;
  const ptx=Math.floor(player.x/TS), pty=Math.floor(player.y/TS);
  const inBush = ptx>=0&&ptx<COLS&&pty>=0&&pty<ROWS&&map[pty][ptx]===BUSH;

  // player move
  let dx=0,dy=0;
  if(keys['w']||keys['arrowup'])dy=-1;
  if(keys['s']||keys['arrowdown'])dy=1;
  if(keys['a']||keys['arrowleft'])dx=-1;
  if(keys['d']||keys['arrowright'])dx=1;
  const running = keys['shift'] && player.stamina > 0;
  let spd = player.speed * (running?1.8:1) * (player.stealth?0.5:1);
  if(dx&&dy){dx*=0.707;dy*=0.707;}
  const nx=player.x+dx*spd, ny=player.y+dy*spd;
  if(canMove(nx,player.y,6)) player.x=nx;
  if(canMove(player.x,ny,6)) player.y=ny;
  player.x=Math.max(8,Math.min((COLS-1)*TS-8,player.x));
  player.y=Math.max(8,Math.min((ROWS-1)*TS-8,player.y));

  // stamina
  if(running&&(dx||dy)) player.stamina=Math.max(0,player.stamina-.6);
  else player.stamina=Math.min(100,player.stamina+.15);

  // food drain
  if(tick%200===0) {
    player.food=Math.max(0,player.food-.5);
    if(player.food<=0) { player.hp-=.5; showMsg('배가 고프다... 체력이 떨어진다'); }
  }

  // attack
  if(player.atkTimer>0) player.atkTimer--;
  if(keys[' '] && player.atkTimer<=0) {
    player.attacking=true; player.atkTimer=20;
    const camX=player.x-W/2, camY=player.y-H/2;
    player.atkAngle=Math.atan2(mouseY-(player.y-camY),mouseX-(player.x-camX));
    const ax=player.x+Math.cos(player.atkAngle)*TS*1.5;
    const ay=player.y+Math.sin(player.atkAngle)*TS*1.5;
    burst(ax,ay,'#ff7a50',5);
    // hit zombies
    zombies.forEach(z=>{
      const d=Math.hypot(z.x-ax,z.y-ay);
      if(d<TS*1.2) {
        z.hp-=2; z.flashTimer=8; z.stunTimer=30;
        z.alerted=true; z.alertTimer=300;
        burst(z.x,z.y,z.type==='boss'?'#a78bfa':z.type==='fast'?'#ff7a50':'#cc2020',10);
        if(z.hp<=0) {
          kills++;
          // alert nearby
          zombies.forEach(z2=>{
            if(z2!==z&&Math.hypot(z2.x-z.x,z2.y-z.y)<TS*10){z2.alerted=true;z2.alertTimer=300;}
          });
        }
      }
    });
    // noise alert
    zombies.forEach(z=>{
      if(Math.hypot(z.x-player.x,z.y-player.y)<TS*8){z.alerted=true;z.alertTimer=300;}
    });
  }
  if(player.atkTimer<15) player.attacking=false;

  // crate pickup
  const ptItem = items.find(it=>!it.picked&&it.x===ptx&&it.y===pty);
  if(ptItem) {
    ptItem.picked=true;
    map[ptItem.y][ptItem.x]=FLOOR;
    if(ptItem.type==='food'){player.food=Math.min(100,player.food+25);showMsg('+25 식량 획득');}
    else if(ptItem.type==='med'){player.hp=Math.min(player.maxHp,player.hp+30);showMsg('+30 HP 회복');}
    else {showMsg('무기 부품 획득');}
  }

  // zombies
  zombies = zombies.filter(z=>z.hp>0);
  zombies.forEach(z=>{
    if(z.stunTimer>0){z.stunTimer--;return;}
    if(z.flashTimer>0) z.flashTimer--;

    const dist=Math.hypot(z.x-player.x,z.y-player.y);
    let sightRange = (isNight?4.5:6.5)*TS;
    if(player.stealth) sightRange*=0.5;
    if(inBush) sightRange*=0.3;

    if((dist<sightRange && lineOfSight(z.x,z.y,player.x,player.y)) || z.alerted) {
      z.alerted=true;
      z.alertTimer = Math.max(z.alertTimer, 180);
      // chase
      const angle=Math.atan2(player.y-z.y,player.x-z.x);
      const spd = z.speed * (isNight?1.4:1) * (dist<TS*2?0.6:1);
      const nzx=z.x+Math.cos(angle)*spd, nzy=z.y+Math.sin(angle)*spd;
      if(canMove(nzx,z.y,5)) z.x=nzx;
      if(canMove(z.x,nzy,5)) z.y=nzy;

      // attack player
      if(dist<TS*0.8 && tick%60===0) {
        player.hp-=z.type==='boss'?8:3;
        player.flashTimer=10;
        burst(player.x,player.y,'#ff5c8a',8);
        if(player.hp<=0) endGame();
      }
    } else {
      // wander
      z.wanderTimer--;
      if(z.wanderTimer<=0){z.wanderAngle=Math.random()*Math.PI*2;z.wanderTimer=60+Math.floor(Math.random()*120);}
      const nzx=z.x+Math.cos(z.wanderAngle)*0.3, nzy=z.y+Math.sin(z.wanderAngle)*0.3;
      if(canMove(nzx,nzy,5)){z.x=nzx;z.y=nzy;}else z.wanderAngle+=Math.PI/2;
    }

    if(z.alertTimer>0) z.alertTimer--;
    if(z.alertTimer<=0) z.alerted=false;
  });

  // particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vx*=.95;p.vy*=.95;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);

  // msg timer
  if(msgTimer>0){msgTimer--;if(msgTimer<=0)$('msg').classList.remove('show');}

  updateFog();
  updateHUD();
}

function updateHUD() {
  $('hpBar').style.width=(player.hp/player.maxHp*100)+'%';
  $('hpBar').style.background=player.hp>50?'#3dffb0':player.hp>25?'#ffb347':'#ff5c8a';
  $('hpVal').textContent=Math.ceil(player.hp);
  $('stamBar').style.width=player.stamina+'%';
  $('foodBar').style.width=player.food+'%';
  $('killVal').textContent=kills;
}

// ── draw ──
function draw() {
  ctx.fillStyle='#0a0a0a'; ctx.fillRect(0,0,W,H);
  if (!player) return;

  const camX=player.x-W/2, camY=player.y-H/2;
  ctx.save();
  ctx.translate(-camX,-camY);

  // tiles
  const sx=Math.max(0,Math.floor(camX/TS)), sy=Math.max(0,Math.floor(camY/TS));
  const ex=Math.min(COLS,Math.ceil((camX+W)/TS)+1), ey=Math.min(ROWS,Math.ceil((camY+H)/TS)+1);

  for(let y=sy;y<ey;y++) for(let x=sx;x<ex;x++) {
    if(!explored[y][x]) continue;
    const isFog = fog[y][x];
    ctx.globalAlpha = isFog ? 0.25 : 1;
    ctx.fillStyle = TILE_COL[map[y][x]] || '#1a1a1a';
    ctx.fillRect(x*TS, y*TS, TS, TS);
    // tree/bush detail
    if(map[y][x]===TREE){ctx.fillStyle='#3a7a20';ctx.fillRect(x*TS+4,y*TS+2,TS-8,TS-6);}
    if(map[y][x]===BUSH){ctx.fillStyle='#4a8a30';ctx.fillRect(x*TS+6,y*TS+6,TS-12,TS-12);ctx.fillRect(x*TS+2,y*TS+10,TS-4,TS-16);}
    if(map[y][x]===CRATE){ctx.fillStyle='#aa9a50';ctx.fillRect(x*TS+4,y*TS+4,TS-8,TS-8);}
  }
  ctx.globalAlpha=1;

  // night overlay
  if(isNight) {
    ctx.fillStyle='rgba(10,15,40,.45)';
    ctx.fillRect(camX,camY,W,H);
  }

  // zombies (only visible ones)
  zombies.forEach(z=>{
    const ztx=Math.floor(z.x/TS), zty=Math.floor(z.y/TS);
    if(ztx<0||ztx>=COLS||zty<0||zty>=ROWS||fog[zty][ztx]) return;

    const zc = z.flashTimer>0?'#fff' : z.type==='boss'?'#6a3a8a' : z.type==='fast'?'#7a5a20' : '#2a4a20';
    // body
    ctx.fillStyle=zc;
    const sz=z.type==='boss'?14:10;
    ctx.fillRect(z.x-sz/2,z.y-sz/2,sz,sz);
    // eyes
    ctx.fillStyle=z.type==='boss'?'#a78bfa':z.type==='fast'?'#ff7a50':'#4a8a30';
    ctx.fillRect(z.x-3,z.y-3,3,2);ctx.fillRect(z.x+1,z.y-3,3,2);
    // alert indicator
    if(z.alerted){ctx.fillStyle='#ff5c8a';ctx.font='bold 10px monospace';ctx.fillText('!',z.x-2,z.y-sz/2-4);}
  });

  // player
  if(player.flashTimer>0){ctx.fillStyle='#fff';player.flashTimer--;}
  else ctx.fillStyle = player.stealth?'rgba(61,255,176,.4)':'#c8b890';
  ctx.fillRect(player.x-5,player.y-5,10,10);
  // stealth indicator
  if(player.stealth) {
    ctx.strokeStyle='rgba(61,255,176,.5)';ctx.lineWidth=1;ctx.setLineDash([3,3]);
    ctx.strokeRect(player.x-8,player.y-8,16,16);ctx.setLineDash([]);
  }
  // attack swing
  if(player.attacking) {
    ctx.strokeStyle='rgba(255,122,80,.6)';ctx.lineWidth=2;
    ctx.beginPath();
    ctx.arc(player.x,player.y,TS*1.5,player.atkAngle-.4,player.atkAngle+.4);
    ctx.stroke();
  }

  // particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.r,p.y-p.r,p.r*2,p.r*2);
  });
  ctx.globalAlpha=1;

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

function startGame() {
  init();
  gameRunning=true;
  $('overlay').classList.add('hidden');
  $('endStats').style.display='none';
  showMsg('생존하라. WASD로 이동, SPACE로 공격.');
}

function endGame() {
  gameRunning=false;
  player.hp=0;
  $('overlay').classList.remove('hidden');
  $('overlay').querySelector('h1').textContent='SIGNAL LOST';
  $('overlay').querySelector('.sub').textContent=`DAY ${day}에서 쓰러졌다`;
  $('endStats').textContent=`KILLS: ${kills} · DAYS SURVIVED: ${day}`;
  $('endStats').style.display='block';
  $('startBtn').textContent='RETRY';
}

$('startBtn').addEventListener('click', startGame);
loop();
</script>
</body>
</html>
