<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四柱 DEMO — 사주팔자 간명기</title>
<style>
:root{--bg:#0a0a12;--card:#12121e;--line:rgba(255,255,255,.06);--fg:#e0e0e0;--fg2:rgba(255,255,255,.4);--accent:#a78bfa;--accent2:#3dffb0;--fire:#ff5c8a;--water:#4fc3f7;--wood:#3dffb0;--metal:#e0e0e0;--earth:#ffb347}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'Pretendard','Malgun Gothic',sans-serif;min-height:100vh;overflow-x:hidden}

header{text-align:center;padding:60px 24px 20px}
header h1{font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:-.02em;color:#fff}
header h1 span{color:var(--accent)}
header .sub{font-size:11px;color:var(--fg2);letter-spacing:.2em;margin-top:6px;text-transform:uppercase}
.demo-badge{display:inline-block;margin-top:14px;padding:5px 14px;border-radius:100px;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.08);font-size:11px;color:var(--accent);letter-spacing:.12em}

.input-section{max-width:440px;margin:32px auto;padding:0 24px}
.input-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px;text-align:center}
.input-card label{display:block;font-size:13px;color:var(--fg2);margin-bottom:12px;letter-spacing:.08em}
.date-row{display:flex;gap:8px;justify-content:center;align-items:center;flex-wrap:wrap}
.date-row select,.date-row input{background:rgba(255,255,255,.05);border:1px solid var(--line);color:#fff;padding:11px 10px;border-radius:10px;font-size:15px;font-family:inherit;text-align:center;-webkit-appearance:none}
.date-row select{min-width:80px}
.date-row input{width:68px}
.time-note{font-size:11px;color:var(--fg2);margin-top:8px}
.btn{display:block;width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(61,255,176,.1));border:1px solid rgba(167,139,250,.3);border-radius:12px;color:var(--accent);font-size:15px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .25s}
.btn:hover{background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(61,255,176,.18));border-color:var(--accent);box-shadow:0 0 24px rgba(167,139,250,.15)}

.result{max-width:560px;margin:0 auto;padding:0 24px 40px;display:none}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

/* 사주 4주 표시 */
.four-pillars{display:flex;justify-content:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.pillar-col{text-align:center;width:80px}
.pillar-label{font-size:10px;color:var(--fg2);letter-spacing:.15em;margin-bottom:6px;text-transform:uppercase}
.pillar-box{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px 0;position:relative;overflow:hidden}
.pillar-box .char{font-size:28px;font-weight:900;line-height:1.1}
.pillar-box .el-label{font-size:9px;margin-top:3px;letter-spacing:.08em}
.pillar-box .divider{height:1px;background:var(--line);margin:6px 12px}
.element-summary{text-align:center;margin-bottom:24px}
.el-bar{display:flex;justify-content:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.el-chip{padding:5px 12px;border-radius:100px;font-size:12px;font-weight:600;letter-spacing:.04em}

.section-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px;margin-bottom:14px}
.section-card h3{font-size:13px;color:var(--fg2);letter-spacing:.15em;margin-bottom:14px;text-transform:uppercase}
.trait-tags{display:flex;flex-wrap:wrap;gap:8px}
.trait-tag{padding:7px 14px;border-radius:100px;font-size:13px;font-weight:500;letter-spacing:.04em}
.strength-weakness{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sw-box{padding:14px;border-radius:12px;font-size:13px;line-height:1.6}
.sw-box .sw-label{font-size:10px;letter-spacing:.15em;margin-bottom:6px;text-transform:uppercase}
.sw-box.str{background:rgba(61,255,176,.06);border:1px solid rgba(61,255,176,.12)}
.sw-box.str .sw-label{color:var(--accent2)}
.sw-box.wk{background:rgba(255,92,138,.06);border:1px solid rgba(255,92,138,.12)}
.sw-box.wk .sw-label{color:var(--fire)}
.reading-text{font-size:14px;line-height:1.8;color:rgba(255,255,255,.7)}
.reading-text b{color:#fff}

/* 오행 차트 */
.el-chart{display:flex;justify-content:center;align-items:flex-end;gap:12px;height:100px;margin:16px 0 8px}
.el-chart-bar{display:flex;flex-direction:column;align-items:center;gap:4px}
.el-chart-bar .bar{width:36px;border-radius:6px 6px 0 0;min-height:4px;transition:height .4s}
.el-chart-bar .bar-label{font-size:10px;color:var(--fg2)}
.el-chart-bar .bar-count{font-size:12px;font-weight:700}

/* 상생상극 */
.relation-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line);font-size:13px}
.relation-row:last-child{border-bottom:none}
.relation-icon{font-size:16px;width:24px;text-align:center}

.promo{max-width:560px;margin:0 auto 40px;padding:0 24px;display:none}
.promo-card{background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(61,255,176,.04));border:1px dashed rgba(167,139,250,.2);border-radius:16px;padding:24px;text-align:center}
.promo-card .icon{font-size:28px;margin-bottom:10px}
.promo-card h3{font-size:15px;color:#fff;margin-bottom:6px}
.promo-card p{font-size:12px;color:var(--fg2);line-height:1.7}
.promo-card .coming{display:inline-block;margin-top:12px;padding:5px 14px;border-radius:100px;border:1px solid rgba(255,92,138,.3);background:rgba(255,92,138,.08);font-size:10px;color:var(--fire);letter-spacing:.15em}
footer{text-align:center;padding:20px;font-size:10px;color:var(--fg2);letter-spacing:.1em;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header>
  <h1>四柱 <span>DEMO</span></h1>
  <div class="sub">사주팔자 간명기 · 四柱八字簡命器</div>
  <div class="demo-badge">DEMO — 정식판은 모바일 앱으로 준비 중</div>
</header>

<div class="input-section">
  <div class="input-card">
    <label>양력 생년월일 + 태어난 시간</label>
    <div class="date-row">
      <input type="number" id="inYear" placeholder="YYYY" min="1920" max="2030" value="1990">
      <select id="inMonth"></select>
      <select id="inDay"></select>
      <select id="inHour"></select>
    </div>
    <div class="time-note">* 시간을 모르면 "모름"을 선택하세요 (일주 기준 분석)</div>
    <button class="btn" onclick="calculate()">간명하기</button>
  </div>
</div>

<div class="result" id="resultArea">
  <div id="pillarSection"></div>
  <div id="resultCards"></div>
</div>

<div class="promo" id="promoArea">
  <div class="promo-card">
    <div class="icon">📱</div>
    <h3>정식판 앱에서는 더 많은 것을 볼 수 있어요</h3>
    <p>
      사주 + 타로 연동 해석 · 대운/세운 흐름 분석<br>
      오행 상생/상극 관계도 · 궁합 보기 · AI 맞춤 상담
    </p>
    <span class="coming">COMING SOON</span>
  </div>
</div>

<footer>四柱 DEMO · by Behelit — 정식판 모바일 앱 개발 중</footer>

// ── 사주 산출 ──
function calcDayPillar(y, m, d) {
  const base = new Date(1900, 0, 1);
  const target = new Date(y, m - 1, d);
  const diff = Math.round((target - base) / 86400000);
  let idx = ((diff % 60) + 10) % 60;
  if (idx < 0) idx += 60;
  return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

function calcYearPillar(y) {
  // 년주: (년 - 4) % 60 (서기 4년이 갑자년)
  let idx = (y - 4) % 60;
  if (idx < 0) idx += 60;
  return { stem: STEMS[idx % 10], branch: BRANCHES[idx % 12] };
}

function calcMonthPillar(yStem, m) {
  // 월주: 월건 지지는 인월(1월)부터 시작, 천간은 년간 기준
  const monthBranches = ["인","묘","진","사","오","미","신","유","술","해","자","축"];
  const branch = monthBranches[(m - 1) % 12];
  const base = MONTH_STEM_BASE[yStem];
  const stemIdx = (base + (m - 1)) % 10;
  return { stem: STEMS[stemIdx], branch };
}

function calcHourPillar(dayStem, hour) {
  // 시주: 시간 → 지지, 천간은 일간 기준
  let branch = "자";
  for (const [s, e, b] of HOUR_BRANCH) {
    if (s > e) { if (hour >= s || hour < e) { branch = b; break; } }
    else { if (hour >= s && hour < e) { branch = b; break; } }
  }
  const branchIdx = BRANCHES.indexOf(branch);
  const dayBase = {갑:0,을:2,병:4,정:6,무:8,기:0,경:2,신:4,임:6,계:8};
  const stemIdx = (dayBase[dayStem] + branchIdx) % 10;
  return { stem: STEMS[stemIdx], branch };
}

const daySel = document.getElementById('inDay');
const hourSel = document.getElementById('inHour');

function fillDays() {
  const y = +document.getElementById('inYear').value || 2000;
  const m = +monthSel.value;
  const maxD = new Date(y, m, 0).getDate();
  const cur = +daySel.value;
  daySel.innerHTML = '';
  for (let d = 1; d <= maxD; d++) daySel.innerHTML += `<option value="${d}" ${d===cur?'selected':''}>${d}일</option>`;
}
monthSel.addEventListener('change', fillDays);
document.getElementById('inYear').addEventListener('change', fillDays);

// ── 오행 카운트 ──
function countElements(pillars) {
  const cnt = {목:0,화:0,토:0,금:0,수:0};
  pillars.forEach(p => {
    cnt[STEM_EL[p.stem]]++;
    cnt[BRANCH_EL[p.branch]]++;
  });
  return cnt;
}

// ── 풀이 생성 ──
function generateReading(pillars, elCount, dayData, hasTime) {
  const dayStem = pillars[2].stem;
  const dayEl = STEM_EL[dayStem];
  const elStyle = EL_STYLES[dayEl];

  // 가장 많은 오행, 가장 적은 오행
  const sorted = Object.entries(elCount).sort((a,b) => b[1] - a[1]);
  const strongest = sorted[0];
  const weakest = sorted[sorted.length - 1];
  const total = Object.values(elCount).reduce((a,b) => a+b, 0);

  // 상생/상극 관계
  const generates = GENERATE[dayEl];
  const overcomes = OVERCOME[dayEl];
  const generatedBy = Object.keys(GENERATE).find(k => GENERATE[k] === dayEl);
  const overcomeBy = Object.keys(OVERCOME).find(k => OVERCOME[k] === dayEl);

  let reading = `<b>${dayStem}(${dayEl}) 일간</b>을 중심으로 본 당신의 사주입니다.\n\n`;
  reading += `${elStyle.성격}\n\n`;

  // 오행 밸런스 분석
  if (strongest[1] >= total * 0.35) {
    reading += `사주에 <b>${EL_EMOJI[strongest[0]]} ${strongest[0]}(${EL_EN[strongest[0]]})</b>의 기운이 강하게 나타납니다. `;
    reading += `${EL_STYLES[strongest[0]].특징}의 성향이 두드러지며, `;
  }
  if (weakest[1] === 0) {
    reading += `반면 <b>${EL_EMOJI[weakest[0]]} ${weakest[0]}(${EL_EN[weakest[0]]})</b>의 기운이 부족합니다. `;
    reading += `${EL_STYLES[weakest[0]].특징} 방면의 보완이 필요할 수 있습니다.\n\n`;
  } else if (weakest[1] <= 1) {
    reading += `<b>${EL_EMOJI[weakest[0]]} ${weakest[0]}</b>의 기운이 약한 편이므로, ${EL_STYLES[weakest[0]].키워드.split(' · ')[0]} 영역에서 의식적인 노력이 도움이 됩니다.\n\n`;
  } else {
    reading += `전반적으로 오행의 균형이 잡혀 있어 안정적인 구조입니다.\n\n`;
  }

  // 상생상극 간략
  reading += `당신의 ${dayEl}은 <b>${generates}</b>을 생(生)하고, <b>${overcomes}</b>을 극(克)합니다. `;
  reading += `<b>${generatedBy}</b>에게서 힘을 받고, <b>${overcomeBy}</b>의 견제를 받는 구조입니다.`;

  if (!hasTime) {
    reading += `\n\n<i style="color:var(--fg2)">* 시주(시간) 정보가 없어 6글자 기준 분석입니다. 태어난 시간을 입력하면 8글자 완전 분석이 가능합니다.</i>`;
  }

  return reading;
}

// ── 메인 계산 ──
function calculate() {
  const y = +document.getElementById('inYear').value;
  const m = +monthSel.value;
  const d = +daySel.value;
  const h = +hourSel.value;
  if (y < 1920 || y > 2030) { alert('연도를 확인해주세요 (1920~2030)'); return; }

  const hasTime = h >= 0;
  const yearP = calcYearPillar(y);
  const monthP = calcMonthPillar(yearP.stem, m);
  const dayP = calcDayPillar(y, m, d);
  const hourP = hasTime ? calcHourPillar(dayP.stem, h) : null;

  const pillars = hasTime ? [yearP, monthP, dayP, hourP] : [yearP, monthP, dayP];
  const labels = hasTime ? ["년주 年","월주 月","일주 日","시주 時"] : ["년주 年","월주 月","일주 日"];
  const subLabels = hasTime
    ? ["조상/초년","부모/청년","나/중년","자녀/말년"]
    : ["조상/초년","부모/청년","나/중년"];

  const dayKey = dayP.stem + dayP.branch;
  const dayData = PILLARS[dayKey];
  if (!dayData) { alert('데이터를 찾을 수 없습니다: ' + dayKey); return; }

  const elCount = countElements(pillars);
  const dayEl = STEM_EL[dayP.stem];
  const c = EL_COLOR[dayEl];

  // 사주 4주 표시
  let pillarHTML = '<div class="four-pillars">';
  pillars.forEach((p, i) => {
    const sc = EL_COLOR[STEM_EL[p.stem]];
    const bc = EL_COLOR[BRANCH_EL[p.branch]];
    pillarHTML += `
      <div class="pillar-col">
        <div class="pillar-label">${labels[i]}</div>
        <div class="pillar-box">
          <div class="char" style="color:${sc}">${p.stem}</div>
          <div class="el-label" style="color:${sc}">${EL_EMOJI[STEM_EL[p.stem]]} ${STEM_EL[p.stem]}</div>
          <div class="divider"></div>
          <div class="char" style="color:${bc}">${p.branch}</div>
          <div class="el-label" style="color:${bc}">${BRANCH_ANIMAL[p.branch]} ${EL_EMOJI[BRANCH_EL[p.branch]]} ${BRANCH_EL[p.branch]}</div>
        </div>
        <div style="font-size:10px;color:var(--fg2);margin-top:5px">${subLabels[i]}</div>
      </div>`;
  });
  pillarHTML += '</div>';

  // 띠 정보
  pillarHTML += `<div style="text-align:center;margin-bottom:6px;font-size:13px;color:var(--fg2)">${y}년 ${m}월 ${d}일${hasTime ? ' ' + String(h).padStart(2,'0') + '시' : ''} · ${BRANCH_ANIMAL[yearP.branch]}띠</div>`;

  // 일간 뱃지
  pillarHTML += `<div style="text-align:center;margin-bottom:24px">
    <span style="display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;font-size:13px;font-weight:600;background:${c}12;border:1px solid ${c}30;color:${c}">
      ${EL_EMOJI[dayEl]} 일간 ${dayP.stem}(${dayEl} · ${EL_EN[dayEl]})
    </span>
  </div>`;

  document.getElementById('pillarSection').innerHTML = pillarHTML;

  // 오행 분포 차트
  const maxEl = Math.max(...Object.values(elCount));
  let chartHTML = '<div class="section-card"><h3>오행 분포</h3><div class="el-chart">';
  for (const el of ["목","화","토","금","수"]) {
    const pct = maxEl > 0 ? (elCount[el] / maxEl) * 80 : 0;
    chartHTML += `<div class="el-chart-bar">
      <div class="bar-count" style="color:${EL_COLOR[el]}">${elCount[el]}</div>
      <div class="bar" style="height:${Math.max(pct, 4)}px;background:${EL_COLOR[el]}"></div>
      <div class="bar-label">${EL_EMOJI[el]} ${el}</div>
    </div>`;
  }
  chartHTML += '</div>';
  // 오행 칩
  chartHTML += '<div class="el-bar">';
  for (const el of ["목","화","토","금","수"]) {
    const opacity = elCount[el] === 0 ? '30' : 'cc';
    chartHTML += `<span class="el-chip" style="background:${EL_COLOR[el]}15;color:${EL_COLOR[el]}${opacity};border:1px solid ${EL_COLOR[el]}${elCount[el]===0?'10':'25'}">${EL_EMOJI[el]} ${el} ${elCount[el]}${elCount[el]===0?' (없음)':''}</span>`;
  }
  chartHTML += '</div></div>';

  // 상생상극
  const generates = GENERATE[dayEl];
  const overcomes = OVERCOME[dayEl];
  const generatedBy = Object.keys(GENERATE).find(k => GENERATE[k] === dayEl);
  const overcomeBy = Object.keys(OVERCOME).find(k => OVERCOME[k] === dayEl);

  let relHTML = '<div class="section-card"><h3>상생 · 상극 관계</h3>';
  relHTML += `<div class="relation-row"><span class="relation-icon">💪</span><span style="color:${EL_COLOR[generatedBy]}">${EL_EMOJI[generatedBy]} ${generatedBy}</span> → <b style="color:${c}">${EL_EMOJI[dayEl]} ${dayEl}</b> <span style="color:var(--fg2);margin-left:auto">나를 생(生)해주는 기운</span></div>`;
  relHTML += `<div class="relation-row"><span class="relation-icon">🌱</span><b style="color:${c}">${EL_EMOJI[dayEl]} ${dayEl}</b> → <span style="color:${EL_COLOR[generates]}">${EL_EMOJI[generates]} ${generates}</span> <span style="color:var(--fg2);margin-left:auto">내가 생(生)하는 기운</span></div>`;
  relHTML += `<div class="relation-row"><span class="relation-icon">⚡</span><b style="color:${c}">${EL_EMOJI[dayEl]} ${dayEl}</b> → <span style="color:${EL_COLOR[overcomes]}">${EL_EMOJI[overcomes]} ${overcomes}</span> <span style="color:var(--fg2);margin-left:auto">내가 극(克)하는 기운</span></div>`;
  relHTML += `<div class="relation-row"><span class="relation-icon">🛡</span><span style="color:${EL_COLOR[overcomeBy]}">${EL_EMOJI[overcomeBy]} ${overcomeBy}</span> → <b style="color:${c}">${EL_EMOJI[dayEl]} ${dayEl}</b> <span style="color:var(--fg2);margin-left:auto">나를 극(克)하는 기운</span></div>`;
  relHTML += '</div>';

  // 성격 + 강약
  let traitHTML = `<div class="section-card"><h3>일주 성격 특성 — ${dayKey}</h3>
    <div class="trait-tags">${dayData.p.map(t => `<span class="trait-tag" style="background:${c}12;color:${c};border:1px solid ${c}20">${t}</span>`).join('')}</div>
  </div>`;
  traitHTML += `<div class="section-card"><h3>강점 / 약점</h3>
    <div class="strength-weakness">
      <div class="sw-box str"><div class="sw-label">강점</div>${dayData.str}</div>
      <div class="sw-box wk"><div class="sw-label">약점</div>${dayData.wk}</div>
    </div>
  </div>`;

  // 풀이
  const reading = generateReading(pillars, elCount, dayData, hasTime);
  let readingHTML = `<div class="section-card"><h3>간명 풀이</h3>
    <div class="reading-text">${reading.replace(/\n/g, '<br>')}</div>
  </div>`;

  document.getElementById('resultCards').innerHTML = chartHTML + relHTML + traitHTML + readingHTML;
  document.getElementById('resultArea').classList.add('show');
  document.getElementById('promoArea').style.display = 'block';
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
