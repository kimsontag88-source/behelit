<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>四柱 DEMO — 일주 간명기</title>
<style>
:root{--bg:#0a0a12;--card:#12121e;--line:rgba(255,255,255,.06);--fg:#e0e0e0;--fg2:rgba(255,255,255,.4);--accent:#a78bfa;--accent2:#3dffb0;--fire:#ff5c8a;--water:#4fc3f7;--wood:#3dffb0;--metal:#e0e0e0;--earth:#ffb347}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--fg);font-family:'Pretendard','Malgun Gothic',sans-serif;min-height:100vh;overflow-x:hidden}
.mono{font-family:'Courier New',monospace}

/* header */
header{text-align:center;padding:60px 24px 20px}
header h1{font-size:clamp(28px,5vw,44px);font-weight:900;letter-spacing:-.02em;color:#fff}
header h1 span{color:var(--accent)}
header .sub{font-size:11px;color:var(--fg2);letter-spacing:.2em;margin-top:6px;text-transform:uppercase}
.demo-badge{display:inline-block;margin-top:14px;padding:5px 14px;border-radius:100px;border:1px solid rgba(167,139,250,.3);background:rgba(167,139,250,.08);font-size:11px;color:var(--accent);letter-spacing:.12em}

/* input section */
.input-section{max-width:400px;margin:32px auto;padding:0 24px}
.input-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:28px 24px;text-align:center}
.input-card label{display:block;font-size:13px;color:var(--fg2);margin-bottom:12px;letter-spacing:.08em}
.date-row{display:flex;gap:10px;justify-content:center;align-items:center}
.date-row select,.date-row input{background:rgba(255,255,255,.05);border:1px solid var(--line);color:#fff;padding:12px 14px;border-radius:10px;font-size:16px;font-family:inherit;text-align:center;-webkit-appearance:none}
.date-row select{min-width:90px}
.date-row input{width:70px}
.date-row select:focus,.date-row input:focus{outline:none;border-color:var(--accent)}
.btn{display:block;width:100%;margin-top:20px;padding:14px;background:linear-gradient(135deg,rgba(167,139,250,.15),rgba(61,255,176,.1));border:1px solid rgba(167,139,250,.3);border-radius:12px;color:var(--accent);font-size:15px;font-weight:700;letter-spacing:.06em;cursor:pointer;transition:all .25s}
.btn:hover{background:linear-gradient(135deg,rgba(167,139,250,.25),rgba(61,255,176,.18));border-color:var(--accent);box-shadow:0 0 24px rgba(167,139,250,.15)}

/* result */
.result{max-width:520px;margin:0 auto;padding:0 24px 60px;display:none}
.result.show{display:block;animation:fadeUp .6s ease}
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}

.pillar-display{text-align:center;margin-bottom:28px}
.pillar-chars{display:flex;justify-content:center;gap:12px;margin-bottom:12px}
.pillar-char{width:72px;height:88px;background:var(--card);border:1px solid var(--line);border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pillar-char::before{content:'';position:absolute;inset:0;opacity:.08;border-radius:14px}
.pillar-char .hanzi{font-size:32px;font-weight:900;line-height:1}
.pillar-char .label{font-size:10px;color:var(--fg2);margin-top:4px;letter-spacing:.1em}
.element-badge{display:inline-flex;align-items:center;gap:6px;padding:6px 16px;border-radius:100px;font-size:13px;font-weight:600;letter-spacing:.06em;margin-top:8px}

.section-card{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:22px 20px;margin-bottom:14px}
.section-card h3{font-size:13px;color:var(--fg2);letter-spacing:.15em;margin-bottom:14px;text-transform:uppercase}
.trait-tags{display:flex;flex-wrap:wrap;gap:8px}
.trait-tag{padding:7px 14px;border-radius:100px;font-size:13px;font-weight:500;letter-spacing:.04em}
.strength-weakness{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.sw-box{padding:14px;border-radius:12px;font-size:13px;line-height:1.6}
.sw-box .sw-label{font-size:10px;letter-spacing:.15em;margin-bottom:6px;text-transform:uppercase}
.sw-box.str{background:rgba(61,255,176,.06);border:1px solid rgba(61,255,176,.12)}
.sw-box.str .sw-label{color:var(--accent2)}
.sw-box.wk{background:rgba(255,92,138,.06);border:1px solid rgba(255,92,138,.12)}
.sw-box.wk .sw-label{color:var(--fire)}
.tone-box{font-size:14px;line-height:1.7;color:rgba(255,255,255,.7);padding:4px 0}
.element-style{font-size:13px;line-height:1.8;color:rgba(255,255,255,.6)}
.element-style span{color:var(--accent);font-weight:600}

/* app promo */
.promo{max-width:520px;margin:0 auto 40px;padding:0 24px}
.promo-card{background:linear-gradient(135deg,rgba(167,139,250,.06),rgba(61,255,176,.04));border:1px dashed rgba(167,139,250,.2);border-radius:16px;padding:24px;text-align:center}
.promo-card .icon{font-size:28px;margin-bottom:10px}
.promo-card h3{font-size:15px;color:#fff;margin-bottom:6px}
.promo-card p{font-size:12px;color:var(--fg2);line-height:1.7}
.promo-card .coming{display:inline-block;margin-top:12px;padding:5px 14px;border-radius:100px;border:1px solid rgba(255,92,138,.3);background:rgba(255,92,138,.08);font-size:10px;color:var(--fire);letter-spacing:.15em}

/* footer */
footer{text-align:center;padding:20px;font-size:10px;color:var(--fg2);letter-spacing:.1em;border-top:1px solid var(--line)}
</style>
</head>
<body>

<header>
  <h1>四柱 <span>DEMO</span></h1>
  <div class="sub">일주 간명기 · 日柱簡命器</div>
  <div class="demo-badge">DEMO — 정식판은 모바일 앱으로 준비 중</div>

<div class="input-section">
  <div class="input-card">
    <label>양력 생년월일을 입력하세요</label>
    <div class="date-row">
      <input type="number" id="inYear" placeholder="YYYY" min="1920" max="2030" value="1990">
      <select id="inMonth"></select>
      <select id="inDay"></select>
    </div>
    <button class="btn" onclick="calculate()">간명하기</button>
  </div>
</div>

<div class="result" id="resultArea">
  <div class="pillar-display" id="pillarDisplay"></div>
  <div id="resultCards"></div>
</div>

<div class="promo" id="promoArea" style="display:none">
  <div class="promo-card">
    <div class="icon">📱</div>
    <h3>정식판 앱에서는 더 많은 것을 볼 수 있어요</h3>
    <p>
      사주 + 타로 연동 해석 · 시주(시간)까지 포함한 사주팔자 완전 분석<br>
      오행 상생/상극 관계 시각화 · AI 맞춤 상담
    </p>
    <span class="coming">COMING SOON</span>
  </div>
</div>

<footer>四柱 DEMO · by Behelit — 정식판 모바일 앱 개발 중</footer>

// ── calculation ──
function calcDayPillar(year, month, day) {
  const base = new Date(1900, 0, 1);
  const target = new Date(year, month - 1, day);
  const diff = Math.round((target - base) / 86400000);
  let idx = ((diff % 60) + 10) % 60;
  if (idx < 0) idx += 60;
  return STEMS[idx % 10] + BRANCHES[idx % 12];
}

// ── UI setup ──
const monthSel = document.getElementById('inMonth');
const daySel = document.getElementById('inDay');
for (let m = 1; m <= 12; m++) monthSel.innerHTML += `<option value="${m}">${m}월</option>`;
function fillDays() {
  const y = +document.getElementById('inYear').value || 2000;
  const m = +monthSel.value;
  const maxD = new Date(y, m, 0).getDate();
  const cur = +daySel.value;
  daySel.innerHTML = '';
  for (let d = 1; d <= maxD; d++) daySel.innerHTML += `<option value="${d}" ${d===cur?'selected':''}>${d}일</option>`;
}
monthSel.addEventListener('change', fillDays);
document.getElementById('inYear').addEventListener('change', fillDays);
monthSel.value = 5; fillDays(); daySel.value = 15;

// ── calculate & render ──
function calculate() {
  const y = +document.getElementById('inYear').value;
  const m = +monthSel.value;
  const d = +daySel.value;
  if (y < 1920 || y > 2030) { alert('연도를 확인해주세요 (1920~2030)'); return; }

  const pillar = calcDayPillar(y, m, d);
  const data = PILLARS[pillar];
  if (!data) { alert('데이터를 찾을 수 없습니다: ' + pillar); return; }

  const stem = pillar[0], branch = pillar[1];
  const stemEl = STEM_EL[stem], branchEl = BRANCH_EL[branch];
  const dominantEl = stemEl;
  const c = EL_COLOR[dominantEl];
  const elStyle = EL_STYLES[dominantEl];

  // pillar display
  document.getElementById('pillarDisplay').innerHTML = `
    <div class="pillar-chars">
      <div class="pillar-char" style="border-color:${EL_COLOR[stemEl]}20">
        <div class="hanzi" style="color:${EL_COLOR[stemEl]}">${stem}</div>
        <div class="label">천간 ${EL_EMOJI[stemEl]} ${stemEl}</div>
      </div>
      <div class="pillar-char" style="border-color:${EL_COLOR[branchEl]}20">
        <div class="hanzi" style="color:${EL_COLOR[branchEl]}">${branch}</div>
        <div class="label">지지 ${EL_EMOJI[branchEl]} ${branchEl}</div>
      </div>
    </div>
    <div style="font-size:13px;color:var(--fg2);margin-bottom:6px">${y}년 ${m}월 ${d}일의 일주</div>
    <div class="element-badge" style="background:${c}12;border:1px solid ${c}30;color:${c}">
      ${EL_EMOJI[dominantEl]} ${dominantEl} (${EL_EN[dominantEl]}) · ${data.el}
    </div>
  `;

  // result cards
  document.getElementById('resultCards').innerHTML = `
    <div class="section-card">
      <h3>성격 특성</h3>
      <div class="trait-tags">
        ${data.p.map(t => `<span class="trait-tag" style="background:${c}12;color:${c};border:1px solid ${c}20">${t}</span>`).join('')}
      </div>
    </div>
    <div class="section-card">
      <h3>강점 / 약점</h3>
      <div class="strength-weakness">
        <div class="sw-box str"><div class="sw-label">강점</div>${data.str}</div>
        <div class="sw-box wk"><div class="sw-label">약점</div>${data.wk}</div>
      </div>
    </div>
    <div class="section-card">
      <h3>조언 성향</h3>
      <div class="tone-box">"${data.tone}"</div>
    </div>
    <div class="section-card">
      <h3>${EL_EMOJI[dominantEl]} ${dominantEl}(${EL_EN[dominantEl]}) 오행 성향</h3>
      <div class="element-style">
        <span>특징:</span> ${elStyle.특징}<br>
        <span>키워드:</span> ${elStyle.키워드}
      </div>
    </div>
  `;

  document.getElementById('resultArea').classList.add('show');
  document.getElementById('promoArea').style.display = 'block';
  document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
