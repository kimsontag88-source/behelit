<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>VOID//BREAK</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a12;font-family:'Courier New',monospace}
canvas{display:block;width:100%;height:100%;touch-action:none}
#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;color:#fff}
#hud{position:absolute;top:16px;left:50%;transform:translateX(-50%);display:flex;gap:32px;font-size:13px;letter-spacing:.15em;text-transform:uppercase;opacity:.7}
#hud span{color:#3dffb0}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:auto;transition:opacity .4s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(28px,6vw,52px);font-weight:900;letter-spacing:-.02em;color:#fff;margin-bottom:4px}
#overlay h1 span{color:#3dffb0}
#overlay .sub{font-size:12px;color:rgba(255,255,255,.35);letter-spacing:.2em;margin-bottom:28px}
#overlay .score-display{font-size:18px;color:#3dffb0;letter-spacing:.1em;margin-bottom:20px;display:none}
#overlay button{background:none;border:1px solid rgba(61,255,176,.4);color:#3dffb0;padding:12px 36px;border-radius:8px;font-family:inherit;font-size:14px;letter-spacing:.15em;cursor:pointer;transition:all .2s;text-transform:uppercase}
#overlay button:hover{background:rgba(61,255,176,.1);border-color:#3dffb0;box-shadow:0 0 20px rgba(61,255,176,.15)}
.controls{font-size:10px;color:rgba(255,255,255,.25);margin-top:16px;letter-spacing:.12em}
#combo{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:clamp(20px,4vw,36px);font-weight:900;color:#3dffb0;opacity:0;transition:opacity .15s;pointer-events:none;text-shadow:0 0 20px rgba(61,255,176,.5)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div>SCORE <span id="scoreVal">0</span></div>
    <div>WAVE <span id="waveVal">1</span></div>
    <div>HP <span id="hpVal">●●●</span></div>
  </div>
  <div id="combo"></div>
  <div id="overlay">
    <h1>VOID//<span>BREAK</span></h1>
    <div class="sub">A MICRO ARCADE BY BEHELIT</div>
    <div class="score-display" id="finalScore"></div>
    <button id="startBtn">START</button>
    <div class="controls">MOUSE / TOUCH TO MOVE · AUTO-FIRE</div>
  </div>
</div>

<script>
const $ = id => document.getElementById(id);
const canvas = $('c');
const ctx = canvas.getContext('2d');
let W, H, dpr;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = window.innerWidth; H = window.innerHeight;
  canvas.width = W * dpr; canvas.height = H * dpr;
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
resize();
window.addEventListener('resize', resize);

// ── state ──
let player, bullets, enemies, particles, stars, score, wave, hp, maxHp;
let gameRunning = false, gameOver = false, fireTimer = 0, waveTimer = 0;
let comboCount = 0, comboTimer = 0, shakeTimer = 0, shakeIntensity = 0;
let mouseX, mouseY, touched = false;

const COLORS = ['#3dffb0','#4fc3f7','#a78bfa','#ff5c8a','#ffb347','#ff7a50'];

function init() {
  player = { x: W / 2, y: H * 0.75, r: 8, trail: [] };
  bullets = []; enemies = []; particles = [];
  score = 0; wave = 1; hp = maxHp = 3; fireTimer = 0; waveTimer = 0;
  comboCount = 0; comboTimer = 0;
  mouseX = player.x; mouseY = player.y;
  stars = Array.from({ length: 80 }, () => ({
    x: Math.random() * W, y: Math.random() * H,
    s: Math.random() * 1.5 + 0.3, sp: Math.random() * 0.6 + 0.2
  }));
  $('scoreVal').textContent = '0';
  $('waveVal').textContent = '1';
  updateHpDisplay();
}

function updateHpDisplay() {
  $('hpVal').textContent = '●'.repeat(hp) + '○'.repeat(maxHp - hp);
  $('hpVal').style.color = hp <= 1 ? '#ff5c8a' : '#3dffb0';
}

// ── input ──
function onMove(x, y) { mouseX = x; mouseY = y; touched = true; }
canvas.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
canvas.addEventListener('touchmove', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
canvas.addEventListener('touchstart', e => { e.preventDefault(); onMove(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });

// ── spawn ──
function spawnEnemy() {
  const type = Math.random();
  const side = Math.random();
  let x, y, vx, vy, r, color, ehp, pts;

  if (type < 0.55) { // basic — falls down
    x = Math.random() * (W - 60) + 30;
    y = -20;
    vx = (Math.random() - 0.5) * 1.2;
    vy = 1.2 + wave * 0.15 + Math.random() * 0.8;
    r = 10 + Math.random() * 6;
    color = COLORS[0];
    ehp = 1; pts = 100;
  } else if (type < 0.8) { // fast — diagonal
    x = side < 0.5 ? -15 : W + 15;
    y = Math.random() * H * 0.3;
    vx = side < 0.5 ? (2 + wave * 0.1) : -(2 + wave * 0.1);
    vy = 1.5 + Math.random();
    r = 7 + Math.random() * 3;
    color = COLORS[3];
    ehp = 1; pts = 150;
  } else { // tank
    x = Math.random() * (W - 80) + 40;
    y = -25;
    vx = (Math.random() - 0.5) * 0.6;
    vy = 0.6 + wave * 0.08;
    r = 16 + Math.random() * 6;
    color = COLORS[4];
    ehp = 2 + Math.floor(wave / 3); pts = 300;
  }
  enemies.push({ x, y, vx, vy, r, color, hp: ehp, maxHp: ehp, pts, t: 0 });
}

function spawnWave() {
  const count = 3 + wave * 2;
  for (let i = 0; i < count; i++) {
    setTimeout(() => { if (gameRunning) spawnEnemy(); }, i * (300 - Math.min(wave * 10, 200)));
  }
}

// ── particles ──
function burst(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = Math.random() * 4 + 1;
    particles.push({
      x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp,
      r: Math.random() * 3 + 1, color, life: 1, decay: 0.02 + Math.random() * 0.03
    });
  }
}

function showCombo(count) {
  const el = $('combo');
  if (count >= 3) {
    el.textContent = count + 'x COMBO!';
    el.style.opacity = '1';
    el.style.color = count >= 8 ? '#ff5c8a' : count >= 5 ? '#ffb347' : '#3dffb0';
    setTimeout(() => { el.style.opacity = '0'; }, 600);
  }
}

// ── update ──
function update() {
  if (!gameRunning) return;

  // player follow mouse
  const dx = mouseX - player.x, dy = mouseY - player.y;
  const dist = Math.sqrt(dx * dx + dy * dy);
  if (dist > 2) {
    const spd = Math.min(dist * 0.12, 14);
    player.x += (dx / dist) * spd;
    player.y += (dy / dist) * spd;
  }
  player.x = Math.max(player.r, Math.min(W - player.r, player.x));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y));

  // trail
  player.trail.push({ x: player.x, y: player.y, a: 1 });
  if (player.trail.length > 12) player.trail.shift();
  player.trail.forEach(t => t.a *= 0.88);

  // auto-fire
  fireTimer++;
  if (fireTimer >= 8) {
    fireTimer = 0;
    bullets.push({ x: player.x, y: player.y - player.r, vy: -9, r: 2.5 });
    // slight spread at higher waves
    if (wave >= 3) {
      bullets.push({ x: player.x - 6, y: player.y - player.r + 3, vx: -0.8, vy: -8.5, r: 2 });
      bullets.push({ x: player.x + 6, y: player.y - player.r + 3, vx: 0.8, vy: -8.5, r: 2 });
    }
  }

  // bullets
  for (let i = bullets.length - 1; i >= 0; i--) {
    const b = bullets[i];
    b.x += (b.vx || 0); b.y += b.vy;
    if (b.y < -10 || b.x < -10 || b.x > W + 10) bullets.splice(i, 1);
  }

  // enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    e.x += e.vx; e.y += e.vy; e.t++;
    // off screen
    if (e.y > H + 40 || e.x < -40 || e.x > W + 40) {
      enemies.splice(i, 1);
      comboCount = 0;
      continue;
    }
    // bullet collision
    for (let j = bullets.length - 1; j >= 0; j--) {
      const b = bullets[j];
      const d = Math.hypot(b.x - e.x, b.y - e.y);
      if (d < e.r + b.r) {
        bullets.splice(j, 1);
        e.hp--;
        burst(b.x, b.y, e.color, 4);
        if (e.hp <= 0) {
          score += e.pts * (1 + comboCount * 0.1);
          comboCount++;
          comboTimer = 90;
          showCombo(comboCount);
          burst(e.x, e.y, e.color, 18);
          shakeTimer = 6; shakeIntensity = 3;
          enemies.splice(i, 1);
          $('scoreVal').textContent = Math.floor(score);
        }
        break;
      }
    }
    // player collision
    if (i < enemies.length) {
      const e2 = enemies[i];
      const pd = Math.hypot(player.x - e2.x, player.y - e2.y);
      if (pd < player.r + e2.r - 2) {
        hp--;
        updateHpDisplay();
        burst(player.x, player.y, '#ff5c8a', 24);
        shakeTimer = 12; shakeIntensity = 8;
        enemies.splice(i, 1);
        comboCount = 0;
        if (hp <= 0) { endGame(); return; }
      }
    }
  }

  // combo decay
  if (comboTimer > 0) comboTimer--;
  else comboCount = 0;

  // particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx; p.y += p.vy;
    p.vx *= 0.97; p.vy *= 0.97;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }

  // wave management
  waveTimer++;
  if (enemies.length === 0 && waveTimer > 120) {
    wave++;
    $('waveVal').textContent = wave;
    waveTimer = 0;
    spawnWave();
  }

  // shake decay
  if (shakeTimer > 0) shakeTimer--;

  // stars
  stars.forEach(s => { s.y += s.sp; if (s.y > H) { s.y = 0; s.x = Math.random() * W; } });
}

// ── draw ──
function draw() {
  ctx.clearRect(0, 0, W, H);

  // screen shake
  let sx = 0, sy = 0;
  if (shakeTimer > 0) {
    sx = (Math.random() - 0.5) * shakeIntensity;
    sy = (Math.random() - 0.5) * shakeIntensity;
  }
  ctx.save();
  ctx.translate(sx, sy);

  // stars
  stars.forEach(s => {
    ctx.globalAlpha = 0.15 + s.s * 0.2;
    ctx.fillStyle = '#fff';
    ctx.fillRect(s.x, s.y, s.s, s.s);
  });
  ctx.globalAlpha = 1;

  // grid lines (subtle)
  ctx.strokeStyle = 'rgba(61,255,176,.03)';
  ctx.lineWidth = 1;
  for (let y = 0; y < H; y += 60) { ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke(); }
  for (let x = 0; x < W; x += 60) { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); }

  if (!gameRunning && !gameOver) { ctx.restore(); return; }

  // player trail
  player.trail.forEach((t, i) => {
    ctx.globalAlpha = t.a * 0.3;
    ctx.fillStyle = '#3dffb0';
    ctx.beginPath();
    ctx.arc(t.x, t.y, player.r * (0.4 + i / player.trail.length * 0.4), 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // player
  ctx.fillStyle = '#3dffb0';
  ctx.shadowColor = '#3dffb0';
  ctx.shadowBlur = 16;
  ctx.beginPath();
  ctx.moveTo(player.x, player.y - player.r - 2);
  ctx.lineTo(player.x - player.r, player.y + player.r);
  ctx.lineTo(player.x + player.r, player.y + player.r);
  ctx.closePath();
  ctx.fill();
  ctx.shadowBlur = 0;

  // bullets
  bullets.forEach(b => {
    ctx.fillStyle = '#3dffb0';
    ctx.shadowColor = '#3dffb0';
    ctx.shadowBlur = 8;
    ctx.fillRect(b.x - 1, b.y - 4, 2, 8);
    ctx.shadowBlur = 0;
  });

  // enemies
  enemies.forEach(e => {
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = e.color;
    ctx.beginPath();
    ctx.arc(e.x, e.y, e.r + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    ctx.fillStyle = e.color;
    ctx.shadowColor = e.color;
    ctx.shadowBlur = 10;
    ctx.beginPath();
    // hexagonal shape
    for (let j = 0; j < 6; j++) {
      const a = (Math.PI / 3) * j - Math.PI / 6 + e.t * 0.02;
      const px = e.x + Math.cos(a) * e.r;
      const py = e.y + Math.sin(a) * e.r;
      j === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.closePath();
    ctx.fill();
    ctx.shadowBlur = 0;

    // hp bar for tanks
    if (e.maxHp > 1) {
      const bw = e.r * 2;
      ctx.fillStyle = 'rgba(255,255,255,.15)';
      ctx.fillRect(e.x - bw / 2, e.y - e.r - 8, bw, 3);
      ctx.fillStyle = e.color;
      ctx.fillRect(e.x - bw / 2, e.y - e.r - 8, bw * (e.hp / e.maxHp), 3);
    }
  });

  // particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// ── game flow ──
function startGame() {
  init();
  gameRunning = true; gameOver = false;
  $('overlay').classList.add('hidden');
  $('finalScore').style.display = 'none';
  spawnWave();
}

function endGame() {
  gameRunning = false; gameOver = true;
  $('overlay').classList.remove('hidden');
  $('overlay').querySelector('h1').innerHTML = 'VOID//<span>BREAK</span>';
  $('overlay').querySelector('.sub').textContent = 'SIGNAL LOST';
  $('finalScore').textContent = 'SCORE: ' + Math.floor(score) + '  ·  WAVE: ' + wave;
  $('finalScore').style.display = 'block';
  $('startBtn').textContent = 'RETRY';
}

$('startBtn').addEventListener('click', startGame);
init();
loop();
</script>
</body>
</html>
